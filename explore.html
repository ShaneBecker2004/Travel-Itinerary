        <div class="filter-container">

    <label for="categoryFilter">Filter by Type:</label>

    <select id="categoryFilter">
    <option value="all">All</option>
    <option value="Attraction">Attractions</option>
    <option value="Restaurant">Restaurants</option>
    <option value="Event">Events</option>
    </select>

    </div>

    <div id="explore-container"></div>
   
    <script>

    let attractions = [];

    function renderAttractions(list) {

        const container = document.getElementById("cityContainer");
        container.innerHTML = "";

        list.forEach(item => {

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
            <div class="container">
                <h3>${item.name}</h3>
                <p>${item.description}</p>
                <p><strong>Location:</strong> ${item.location}</p>
                <p><strong>Type:</strong> ${item.category}</p>
            </div>
            `;

            container.appendChild(card);

        });
    }

    fetch("/api/attractions")
    .then(res => res.json())
    .then(data => {
        attractions = data;
        renderAttractions(attractions);
    });

    document.getElementById("categoryFilter").addEventListener("change", function(){

        const category = this.value;

        if(category === "all"){
            renderAttractions(attractions);
            return;
        }

        const filtered = attractions.filter(a => a.category === category);

        renderAttractions(filtered);

    });

    </script>


    </body>   

    <script>

    async function loadAttractions() {

        try {

            const response = await fetch("/api/attractions");
            const attractions = await response.json();

            const container = document.getElementById("explore-container");

            container.innerHTML = "";

            attractions.forEach(attraction => {

                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <img src="img_avatar.png" alt="${attraction.name}" style="width:100%">
                    <div class="container">
                        <h4><b>${attraction.name}</b></h4>
                        <p>${attraction.category} in ${attraction.city}</p>
                    </div>
                `;

                container.appendChild(card);

            });

        } catch (error) {

            console.error("Error loading attractions:", error);

        }

    }

    loadAttractions();

    </script>
